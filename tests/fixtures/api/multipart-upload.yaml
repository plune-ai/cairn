openapi: 3.0.3
info:
  title: Upload Service
  version: 1.0.0
paths:
  /upload:
    post:
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        '201':
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
