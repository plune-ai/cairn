name: Publish to npm and GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.3.1). package.json is set to this tag automatically."
        required: true

permissions:
  contents: read      # read-only access to code — nothing is committed back to the repo
  id-token: write     # npm provenance (OIDC signing)
  packages: write     # publish to GitHub Packages

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish || github.ref }}

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # --- Version: the release TAG is the source of truth. Set package.json to it for THIS publish
      # (ephemeral — runs in CI, is NOT committed back to the repo). Build reads the version from
      # package.json (BOT_VERSION, #30), so `cairn --version` and the published tarball both match the
      # tag — no manual `npm version` before tagging. `--allow-same-version` keeps re-runs idempotent. ---
      - name: Set package.json version from the release tag
        run: |
          WANT="${{ steps.meta.outputs.version }}"
          npm version "$WANT" --no-git-tag-version --allow-same-version
          echo "package.json set to $WANT for this publish."

      # --- Checks (mirror of ci.yml) ---
      - name: Install Playwright Chromium (for integration tests)
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Test (coverage gate)
        run: npm run test:coverage

      # --- Determine dist-tag (alpha/beta/rc/latest) — ported logic from qa-skills ---
      - name: Determine npm dist-tag
        id: dist
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if   echo "$TAG" | grep -qE "alpha|-alpha|\.a\."; then echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif echo "$TAG" | grep -qE "beta|-beta|\.b\.";  then echo "tag=beta"  >> "$GITHUB_OUTPUT"
          elif echo "$TAG" | grep -qE "rc|-rc|\.rc\.";     then echo "tag=rc"    >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then echo "tag=beta" >> "$GITHUB_OUTPUT"
          else echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      # --- Phase 1: GitHub Packages (no provenance; package name @plune-ai/cairn does NOT change) ---
      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@plune-ai"
      - name: Publish to GitHub Packages
        run: |
          VER="${{ steps.meta.outputs.version }}"
          if npm view "@plune-ai/cairn@$VER" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "@plune-ai/cairn@$VER already in GitHub Packages — skipping (idempotent)."
          else
            npm pkg set publishConfig.registry=https://npm.pkg.github.com
            npm publish --tag ${{ steps.dist.outputs.tag }}
            npm pkg delete publishConfig.registry
          fi
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      # --- Phase 2: npm registry (with provenance) ---
      # scope MUST be set here too: otherwise @plune-ai:registry from Phase 1 (.npmrc) keeps
      # pointing at GitHub Packages, and `npm publish` for the scoped package will NOT go to npmjs.
      - name: Setup Node for npm
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@plune-ai"
      - name: Publish to npm
        run: |
          VER="${{ steps.meta.outputs.version }}"
          if npm view "@plune-ai/cairn@$VER" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "@plune-ai/cairn@$VER already on npm — skipping (idempotent)."
          else
            npm publish --provenance --tag ${{ steps.dist.outputs.tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
